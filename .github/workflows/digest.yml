name: Bull and Byte daily digest

on:
  schedule:
    # 03:00 UTC == 08:30 IST. Edit this line to change the delivery time.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bull-and-byte-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit updated seen state
        run: |
          if [ -n "$(git status --porcelain state/seen.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update seen state [skip ci]"
            git push
          else
            echo "No changes to state/seen.json."
          fi
