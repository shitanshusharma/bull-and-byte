name: Bull and Byte daily digest

on:
  schedule:
    # 03:00 UTC == 08:30 IST. Edit this line to change the delivery time.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bull-and-byte-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: fan out to multiple chats and/or add Groq AI summaries.
          # Define these as repo secrets to enable; empty/unset is fine.
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot.py

      - name: Commit updated state
        # Run even if the digest step failed: a partial send still records the
        # ids that were delivered, so we must persist them to avoid resending.
        if: ${{ !cancelled() }}
        run: |
          if [ -n "$(git status --porcelain state/seen.json state/last_run.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json state/last_run.json
            git commit -m "chore: update run state [skip ci]"
            pushed=false
            for attempt in 1 2 3; do
              # Rebase onto any concurrent/remote changes before pushing so a
              # moved remote tip doesn't drop our state update.
              if git pull --rebase --autostash && git push; then
                pushed=true
                break
              fi
              echo "push attempt $attempt failed; retrying in 5s..."
              sleep 5
            done
            if [ "$pushed" != "true" ]; then
              echo "ERROR: could not push updated seen state after 3 attempts" >&2
              exit 1
            fi
          else
            echo "No changes to state/seen.json."
          fi
